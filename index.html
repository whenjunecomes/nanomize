<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NANOMIZE</title>
<style>
:root{--blue:#2563eb;--blueSoft:#eff6ff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--soft:#f8fafc}
*{box-sizing:border-box}body{margin:0;background:var(--soft);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif}button,input{font-family:inherit}
.top{height:72px;background:rgba(255,255,255,.94);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;backdrop-filter:blur(12px)}
.topin{max-width:1400px;margin:auto;height:100%;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.logo{font-size:30px;font-weight:950;letter-spacing:-.05em;color:#000}.right{display:flex;align-items:center;gap:14px}
.search{position:relative;width:360px}.search span{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#94a3b8}.search input{width:100%;height:44px;border:1px solid var(--line);border-radius:16px;background:#f8fafc;padding:0 14px 0 40px;font-size:14px;outline:0}.search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.units{display:flex;align-items:center;gap:8px}.units b{font-size:13px}.utabs{display:flex;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:white}.utabs button{border:0;border-right:1px solid var(--line);background:white;padding:11px 15px;font-weight:800;color:#475569}.utabs button:last-child{border-right:0}.utabs button.on{background:var(--blue);color:white}
.wrap{max-width:1400px;margin:auto;padding:24px;display:grid;grid-template-columns:240px 1fr;gap:22px}.side{position:sticky;top:96px;height:calc(100vh - 120px);display:flex;flex-direction:column;gap:16px}.panel,.head,.card{background:white;border:1px solid var(--line);box-shadow:0 1px 3px rgba(15,23,42,.04)}.panel{border-radius:28px;padding:12px}
.nav{width:100%;border:0;background:transparent;border-radius:18px;padding:13px 14px;margin-bottom:4px;display:flex;justify-content:space-between;font-size:14px;font-weight:850;color:#475569;cursor:pointer}.nav:hover{background:#f8fafc}.nav.on{background:var(--blueSoft);color:var(--blue)}.count{font-size:12px;background:#f1f5f9;border-radius:999px;padding:2px 8px;color:#64748b}.nav.on .count{background:white;color:var(--blue)}
.rtitle{display:flex;justify-content:space-between;align-items:center;padding:4px 4px 10px;font-weight:900;font-size:14px}.ritem{display:block;width:100%;border:0;background:transparent;text-align:left;color:#64748b;padding:9px 10px;border-radius:14px;font-size:14px;font-weight:650;cursor:pointer}.ritem:hover{background:#f8fafc;color:var(--blue)}
.note{margin-top:auto;color:#94a3b8;font-size:12px;line-height:1.5;padding:0 6px 6px}.bar{display:flex;gap:12px;margin-bottom:14px}.head{flex:1;border-radius:28px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between}.ht{font-size:21px;font-weight:950;display:flex;gap:12px;align-items:center}.dot{width:10px;height:10px;background:var(--blue);border-radius:50%}.hc{font-size:14px;color:var(--muted)}.mini{display:flex;gap:8px}.mini button{height:48px;border-radius:18px;border:1px solid var(--line);background:white;color:#475569;padding:0 14px;font-weight:850}
.cards{display:flex;flex-direction:column;gap:12px}.card{border-radius:24px;overflow:visible}.ctop{width:100%;border:0;background:transparent;padding:17px 20px;display:flex;align-items:center;justify-content:space-between;text-align:left;cursor:pointer}.cl{display:flex;align-items:center;gap:12px;min-width:0}.stat{width:10px;height:10px;border:1px solid #cbd5e1;border-radius:50%;background:white}.stat.done{background:var(--blue);border-color:var(--blue)}.name{font-size:18px;font-weight:950;white-space:nowrap}.badge{font-size:12px;font-weight:850;color:var(--blue);background:var(--blueSoft);border-radius:999px;padding:5px 9px;white-space:nowrap}.closed{color:var(--blue);font-size:18px;font-weight:950}.chev{font-size:18px;color:#64748b}
.tipw{position:relative;display:inline-flex}.q{width:17px;height:17px;border:1px solid #cbd5e1;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#94a3b8;font-size:11px;font-weight:900}.tipw:hover .q{color:var(--blue);border-color:var(--blue)}.tip{display:none;position:absolute;left:0;top:27px;width:330px;max-width:calc(100vw - 32px);background:white;border:1px solid var(--line);border-radius:16px;padding:12px;color:#64748b;font-size:12px;line-height:1.55;box-shadow:0 18px 40px rgba(15,23,42,.12);z-index:50}.tip:before{content:"";position:absolute;top:-6px;left:13px;width:10px;height:10px;background:white;border-left:1px solid var(--line);border-top:1px solid var(--line);transform:rotate(45deg)}.tipw:hover .tip{display:block}
.body{display:none;grid-template-columns:1fr .9fr;gap:24px;border-top:1px solid #f1f5f9;padding:20px}.card.open .body{display:grid}.inputs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.field label{display:flex;gap:5px;align-items:center;color:var(--muted);font-size:12px;font-weight:750;margin-bottom:6px}.field input{width:100%;height:42px;border:1px solid var(--line);border-radius:14px;outline:0;padding:0 12px;font-size:14px}.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}.link{color:var(--blue);font-size:13px;font-weight:950}.linkcap{color:#64748b;font-size:11px}
.resbox{border-left:1px solid #f1f5f9;padding-left:22px}.resrow{display:flex;align-items:center;justify-content:space-between;gap:12px}.res{color:var(--blue);font-size:34px;font-weight:950;letter-spacing:-.04em}.copy{border:1px solid var(--line);background:white;color:#64748b;border-radius:13px;width:39px;height:39px;font-weight:900}.copy:hover{color:var(--blue);border-color:#bfdbfe}.formula{color:var(--muted);font-size:12px;margin-top:3px}.procbtn{border:1px solid var(--line);background:white;padding:9px 12px;margin-top:16px;color:#475569;font-size:12px;font-weight:850;border-radius:13px}.procbtn:hover{color:var(--blue);border-color:#bfdbfe}.proc{max-height:0;overflow:hidden;opacity:0;transition:.22s}.proc.show{max-height:190px;opacity:1;margin-top:12px}.procin{background:#f8fafc;border-radius:16px;padding:13px;color:#64748b;font-size:12px;line-height:1.65;white-space:pre-line}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#0f172a;color:white;padding:11px 16px;border-radius:999px;font-size:13px;font-weight:850;opacity:0;pointer-events:none;transition:.18s;z-index:999}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:1020px){.wrap{grid-template-columns:1fr;padding:16px}.side{position:static;height:auto;order:2}.search{display:none}.units b{display:none}.body{grid-template-columns:1fr}.resbox{border-left:0;border-top:1px solid #f1f5f9;padding-left:0;padding-top:18px}.inputs{grid-template-columns:1fr}.bar{flex-direction:column}.mini{display:grid;grid-template-columns:1fr 1fr}}@media(max-width:560px){.topin{padding:0 16px}.logo{font-size:24px}.utabs button{padding:10px 11px;font-size:12px}.name{font-size:16px}.badge{display:none}.res{font-size:30px}}
</style>
</head>
<body>
<header class="top"><div class="topin"><div class="logo">NANOMIZE</div><div class="right"><div class="search"><span>⌕</span><input id="search" placeholder="지표 검색 예: PER, FCF"></div><div class="units"><b>단위</b><div class="utabs" id="unitTabs"></div></div></div></div></header>
<main class="wrap"><aside class="side"><div class="panel" id="groups"></div><div class="panel"><div class="rtitle"><span>최근 열람</span><button id="clearRecent" style="border:0;background:transparent;color:#94a3b8;cursor:pointer;font-size:18px">×</button></div><div id="recent"></div></div><div class="note">입력값은 브라우저에 자동 저장됩니다.<br>삭제하려면 초기화를 누르세요.</div></aside><section class="content"><div class="bar"><div class="head"><div class="ht"><span class="dot"></span><span id="sectionTitle">핵심</span></div><div class="hc" id="sectionCount">0개 지표</div></div><div class="mini"><button id="collapseAll">모두 접기</button><button id="resetAll">초기화</button></div></div><div class="cards" id="cards"></div></section></main><div class="toast" id="toast">복사됨</div>
<script>
const metrics=[
{g:'핵심',k:'per',t:'PER',f:'시가총액 / 순이익',fs:[['marketCap','시가총액'],['netIncome','순이익']],s:'x',c:v=>div(v.marketCap,v.netIncome),i:'순이익 대비 시장가치를 보는 대표 지표입니다. 이익이 안정적인 기업 비교에 유용하지만 일회성 손익이나 경기 사이클에 영향을 받을 수 있습니다.'},
{g:'핵심',k:'forwardPer',t:'Forward PER',f:'주가 / 예상 EPS',fs:[['price','주가'],['forwardEps','예상 EPS']],s:'x',c:v=>div(v.price,v.forwardEps),i:'예상 EPS를 기준으로 앞으로의 이익 대비 현재 주가를 봅니다. 성장주나 턴어라운드 기업에 유용하지만 추정치 변화에 민감합니다.'},
{g:'핵심',k:'peg',t:'PEG',f:'PER / 이익성장률',fs:[['perInput','PER'],['growth','성장률 %']],s:'x',c:v=>div(v.perInput,v.growth),i:'PER을 성장률로 나눠 성장 대비 가격을 봅니다. 성장률 추정이 틀리면 결과도 크게 왜곡될 수 있습니다.'},
{g:'핵심',k:'pbr',t:'PBR',f:'시가총액 / 자기자본',fs:[['marketCap','시가총액'],['equity','자기자본']],s:'x',c:v=>div(v.marketCap,v.equity),i:'장부상 순자산 대비 시장가치를 봅니다. 금융주, 지주사, 자산주에 자주 쓰이며 ROE와 함께 보는 것이 좋습니다.'},
{g:'핵심',k:'psr',t:'PSR',f:'시가총액 / 매출',fs:[['marketCap','시가총액'],['revenue','매출']],s:'x',c:v=>div(v.marketCap,v.revenue),i:'매출 대비 시장가치를 봅니다. 적자 기업이나 초기 성장기업 분석에 쓰이지만 마진 차이를 반영하지 못합니다.'},
{g:'핵심',k:'ev',t:'EV',f:'시가총액 + 총부채 - 현금',fs:[['marketCap','시가총액'],['debt','총부채'],['cash','현금']],s:'',c:v=>num(v.marketCap)+num(v.debt)-num(v.cash),i:'시가총액에 부채와 현금을 반영한 기업 전체 가격입니다. 자본구조가 다른 기업을 비교할 때 유용합니다.'},
{g:'핵심',k:'evSales',t:'EV/Sales',f:'EV / 매출',fs:[['ev','EV'],['revenue','매출']],s:'x',c:v=>div(v.ev,v.revenue),i:'EV를 매출로 나눈 지표입니다. 적자 성장기업 비교에 쓰이지만 수익성과 함께 봐야 합니다.'},
{g:'핵심',k:'evEbitda',t:'EV/EBITDA',f:'EV / EBITDA',fs:[['ev','EV'],['ebitda','EBITDA']],s:'x',c:v=>div(v.ev,v.ebitda),i:'감가상각, 세금, 자본구조 차이를 일부 제거해 기업 간 비교가 쉽습니다. IB, PE, M&A에서 자주 쓰입니다.'},
{g:'핵심',k:'evEbit',t:'EV/EBIT',f:'EV / 영업이익',fs:[['ev','EV'],['ebit','영업이익']],s:'x',c:v=>div(v.ev,v.ebit),i:'감가상각 부담까지 반영한 영업이익 기준 배수입니다. 설비투자가 큰 기업을 더 보수적으로 볼 때 유용합니다.'},
{g:'현금흐름',k:'fcf',t:'FCF',f:'영업현금흐름 - CAPEX',fs:[['cfo','영업현금흐름'],['capex','CAPEX']],s:'',c:v=>num(v.cfo)-num(v.capex),i:'영업현금흐름에서 CAPEX를 뺀 값입니다. 실제로 기업에 남는 현금흐름을 확인하는 출발점입니다.'},
{g:'현금흐름',k:'pFcf',t:'P/FCF',f:'시가총액 / FCF',fs:[['marketCap','시가총액'],['fcf','FCF']],s:'x',c:v=>div(v.marketCap,v.fcf),i:'시가총액 대비 잉여현금흐름을 봅니다. 회계이익보다 실제 현금창출력을 중시할 때 유용합니다.'},
{g:'현금흐름',k:'fcfYield',t:'FCF Yield',f:'FCF / 시가총액',fs:[['fcf','FCF'],['marketCap','시가총액']],s:'%',c:v=>{let r=div(v.fcf,v.marketCap);return r===null?null:r*100},i:'현재 가격 대비 현금흐름 수익률을 봅니다. 가치투자와 사모펀드 관점에서 중요하지만 CAPEX 변동에 민감합니다.'},
{g:'현금흐름',k:'cfoYield',t:'CFO Yield',f:'영업현금흐름 / 시가총액',fs:[['cfo','영업현금흐름'],['marketCap','시가총액']],s:'%',c:v=>{let r=div(v.cfo,v.marketCap);return r===null?null:r*100},i:'영업현금흐름을 시가총액과 비교합니다. 순이익보다 현금흐름의 질을 보고 싶을 때 유용합니다.'},
{g:'현금흐름',k:'capexSales',t:'CAPEX/Sales',f:'CAPEX / 매출',fs:[['capex','CAPEX'],['revenue','매출']],s:'%',c:v=>{let r=div(v.capex,v.revenue);return r===null?null:r*100},i:'매출 대비 설비투자 부담을 봅니다. 반도체처럼 자본집약적인 산업에서 투자 부담과 사이클을 볼 때 유용합니다.'},
{g:'퀄리티',k:'roe',t:'ROE',f:'순이익 / 자기자본',fs:[['netIncome','순이익'],['equity','자기자본']],s:'%',c:v=>{let r=div(v.netIncome,v.equity);return r===null?null:r*100},i:'자기자본으로 얼마나 이익을 내는지 봅니다. 단, 레버리지로 높아질 수 있습니다.'},
{g:'퀄리티',k:'roa',t:'ROA',f:'순이익 / 총자산',fs:[['netIncome','순이익'],['assets','총자산']],s:'%',c:v=>{let r=div(v.netIncome,v.assets);return r===null?null:r*100},i:'총자산으로 얼마나 이익을 내는지 봅니다. 자산 효율성을 확인할 때 유용합니다.'},
{g:'퀄리티',k:'roic',t:'ROIC',f:'NOPAT / 투하자본',fs:[['nopat','NOPAT'],['investedCapital','투하자본']],s:'%',c:v=>{let r=div(v.nopat,v.investedCapital);return r===null?null:r*100},i:'투하자본으로 얼마나 영업이익을 창출하는지 봅니다. 장기 경쟁력과 자본효율성을 판단하는 핵심 지표입니다.'},
{g:'퀄리티',k:'croic',t:'CROIC',f:'FCF / 투하자본',fs:[['fcf','FCF'],['investedCapital','투하자본']],s:'%',c:v=>{let r=div(v.fcf,v.investedCapital);return r===null?null:r*100},i:'투하자본 대비 실제 현금창출력을 봅니다. ROIC보다 현금 중심으로 기업의 질을 확인할 때 유용합니다.'},
{g:'퀄리티',k:'grossMargin',t:'매출총이익률',f:'매출총이익 / 매출',fs:[['grossProfit','매출총이익'],['revenue','매출']],s:'%',c:v=>{let r=div(v.grossProfit,v.revenue);return r===null?null:r*100},i:'제품 경쟁력, 가격 결정력, 원가 구조를 파악하는 데 유용합니다.'},
{g:'퀄리티',k:'operatingMargin',t:'영업이익률',f:'영업이익 / 매출',fs:[['ebit','영업이익'],['revenue','매출']],s:'%',c:v=>{let r=div(v.ebit,v.revenue);return r===null?null:r*100},i:'본업에서 남는 이익률입니다. 기업의 기본 수익성을 볼 때 자주 사용합니다.'},
{g:'퀄리티',k:'eva',t:'EVA',f:'NOPAT - 투하자본 × WACC',fs:[['nopat','NOPAT'],['investedCapital','투하자본'],['wacc','WACC %']],s:'',c:v=>num(v.nopat)-num(v.investedCapital)*num(v.wacc)/100,i:'NOPAT에서 자본비용을 차감한 경제적 부가가치입니다. 자본비용을 넘는 진짜 초과이익을 봅니다.'},
{g:'자산/재무',k:'nav',t:'NAV',f:'자산가치 - 부채가치',fs:[['assetValue','자산가치'],['liabilityValue','부채가치']],s:'',c:v=>num(v.assetValue)-num(v.liabilityValue),i:'자산가치에서 부채가치를 뺀 순자산가치입니다. 지주사, 부동산, 자산주 분석에 많이 사용됩니다.'},
{g:'자산/재무',k:'navDiscount',t:'NAV 할인율',f:'1 - 시가총액 / NAV',fs:[['marketCap','시가총액'],['nav','NAV']],s:'%',c:v=>{let r=div(v.marketCap,v.nav);return r===null?null:(1-r)*100},i:'시가총액이 NAV 대비 얼마나 차이 나는지 봅니다. 자산가치와 시장가격의 괴리를 확인할 때 사용합니다.'},
{g:'자산/재무',k:'sotpDiscount',t:'SOTP 할인율',f:'1 - 시가총액 / SOTP',fs:[['marketCap','시가총액'],['sotp','SOTP 합산가치']],s:'%',c:v=>{let r=div(v.marketCap,v.sotp);return r===null?null:(1-r)*100},i:'사업부별 합산가치 대비 시가총액의 차이를 봅니다. 복합기업이나 지주사 분석에 유용합니다.'},
{g:'특수/기타',k:'evArr',t:'EV/ARR',f:'EV / ARR',fs:[['ev','EV'],['arr','ARR']],s:'x',c:v=>div(v.ev,v.arr),i:'연간 반복매출 대비 기업가치를 봅니다. SaaS나 구독형 기업에서 아직 이익이 작을 때 자주 사용됩니다.'},
{g:'특수/기타',k:'evMrr',t:'EV/MRR Annualized',f:'EV / (MRR × 12)',fs:[['ev','EV'],['mrr','MRR']],s:'x',c:v=>div(v.ev,raw(v.mrr)*12),i:'월 반복매출을 연환산해 기업가치와 비교합니다. 초기 구독형 기업 분석에 유용합니다.'},
{g:'특수/기타',k:'pFfo',t:'P/FFO',f:'시가총액 / FFO',fs:[['marketCap','시가총액'],['ffo','FFO']],s:'x',c:v=>div(v.marketCap,v.ffo),i:'REIT의 운영현금흐름 성격인 FFO 대비 가격을 봅니다. 부동산 투자회사에서 순이익보다 자주 사용됩니다.'},
{g:'특수/기타',k:'dividendYield',t:'Dividend Yield',f:'주당배당금 / 주가',fs:[['dividend','주당배당금'],['price','주가']],s:'%',c:v=>{let r=div(v.dividend,v.price);return r===null?null:r*100},i:'주가 대비 배당금 수익률입니다. 배당주 분석에 유용하지만 배당 지속가능성은 별도 확인이 필요합니다.'}
];
const groups=['핵심','현금흐름','퀄리티','자산/재무','특수/기타'],units=[['원',1],['억',1e8],['조',1e12],['백만달러',1e6]];
let st=load();function def(){return{g:'핵심',q:'',v:{},u:1,open:['per','fcf'],proc:[],recent:['PER','ROIC','EV/EBITDA','FCF Yield','PBR']}}function load(){try{return{...def(),...JSON.parse(localStorage.getItem('nanomize_state')||'{}')}}catch{return def()}}function save(){localStorage.setItem('nanomize_state',JSON.stringify(st))}
function raw(v){let x=Number(String(v||'').replaceAll(',',''));return Number.isFinite(x)?x:0}function num(v){return raw(v)*units[st.u][1]}function div(a,b){let y=num(b);return y===0?null:num(a)/y}function fmt(v,s=''){return(v===null||v===undefined||Number.isNaN(v)||!Number.isFinite(v))?'-':v.toLocaleString(undefined,{maximumFractionDigits:2})+s}
function fin(v){let r=String(v||'').replaceAll(',','');if(r==='')return'';if(r==='-')return'-';let neg=r[0]==='-',u=neg?r.slice(1):r,p=u.split('.'),i=p[0],d=p.length>1?p.slice(1).join(''):null,o='';while(i.length>3){o=','+i.slice(-3)+o;i=i.slice(0,-3)}return(neg?'-':'')+i+o+(d!==null?'.'+d:'')}function valid(t){return t===''||t==='-'||/^-?\d*\.?\d*$/.test(t)}function has(v){return String(v||'').trim()!==''&&String(v||'').trim()!=='-'}
function comp(k){let m=metrics.find(x=>x.k===k);return m?m.c(st.v):null}function sync(){let ev=comp('ev');if(!has(st.v.ev)&&Number.isFinite(ev))st.v.ev=String(ev/units[st.u][1]);let f=comp('fcf');if(!has(st.v.fcf)&&Number.isFinite(f))st.v.fcf=String(f/units[st.u][1]);let n=comp('nav');if(!has(st.v.nav)&&Number.isFinite(n))st.v.nav=String(n/units[st.u][1])}
function addRecent(t){st.recent=[t,...st.recent.filter(x=>x!==t)].slice(0,6);save();recent()}function toast(t){let e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1100)}
function render(){sync();unitsUI();groupsUI();recent();cards()}function unitsUI(){unitTabs.innerHTML=units.map((u,i)=>`<button class="${i===st.u?'on':''}" data-u="${i}">${u[0]}</button>`).join('');document.querySelectorAll('[data-u]').forEach(b=>b.onclick=()=>{st.u=+b.dataset.u;save();render()})}
function groupsUI(){groupsEl=document.getElementById('groups');groupsEl.innerHTML=groups.map(g=>`<button class="nav ${g===st.g?'on':''}" data-g="${g}"><span>${g}</span><span class="count">${metrics.filter(m=>m.g===g).length}</span></button>`).join('');document.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>{st.g=b.dataset.g;st.q='';search.value='';save();render()})}
function recent(){recentEl.innerHTML=st.recent.length?st.recent.map(r=>`<button class="ritem" data-r="${r}">${r}</button>`).join(''):'<div style="color:#94a3b8;font-size:13px;padding:8px">최근 열람 없음</div>';document.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>{let m=metrics.find(x=>x.t===b.dataset.r);if(m)st.g=m.g;st.q=b.dataset.r;search.value=st.q;save();render()})}
function cards(){sync();let q=st.q.toLowerCase(),list=metrics.filter(m=>m.g===st.g&&(!q||m.t.toLowerCase().includes(q)||m.f.toLowerCase().includes(q)));sectionTitle.textContent=st.g;sectionCount.textContent=`${list.length}개 지표`;document.getElementById('cards').innerHTML=list.map(card).join('')||'<div class="panel" style="padding:24px;color:#64748b">검색 결과가 없습니다.</div>';events()}
function card(m){let c=m.c(st.v),done=c!==null&&c!==undefined&&Number.isFinite(c),open=st.open.includes(m.k),po=st.proc.includes(m.k);let inputs=m.fs.map(([k,l])=>{let linked=(k==='fcf'||k==='ev'||k==='nav')&&has(st.v[k]);return`<div class="field"><label>${l} ${linked?'<span class="link">↗</span><span class="linkcap">자동 연결</span>':''}</label><input data-key="${k}" value="${fin(st.v[k])}" placeholder="0"></div>`}).join('');let proc=m.fs.map(([k,l])=>`${l}: ${has(st.v[k])?fin(st.v[k])+' '+units[st.u][0]:'미입력'}`).join('\n')+`\n\n${m.t} = ${m.f}\n= ${fmt(c,m.s)}`;return`<div class="card ${open?'open':''}"><button class="ctop" data-tog="${m.k}"><div class="cl"><span class="stat ${done?'done':''}"></span><span class="name">${m.t}</span><span class="tipw"><span class="q">?</span><span class="tip">${m.i}</span></span><span class="badge">입력 ${m.fs.length}개</span></div><div style="display:flex;align-items:center;gap:16px">${!open?`<span class="closed">${fmt(c,m.s)}</span>`:''}<span class="chev">${open?'⌃':'⌄'}</span></div></button><div class="body"><div class="inputs">${inputs}</div><div class="resbox"><div class="resrow"><div class="res">${fmt(c,m.s)}</div><button class="copy" data-copy="${fmt(c,m.s)}">⧉</button></div><div class="formula">${m.f}</div><button class="procbtn" data-proc="${m.k}">${po?'계산 과정 숨기기':'계산 과정 보기'}⌄</button><div class="proc ${po?'show':''}"><div class="procin">${proc}</div></div></div></div></div>`}
function events(){document.querySelectorAll('[data-tog]').forEach(b=>b.onclick=e=>{if(e.target.closest('.tipw'))return;let k=b.dataset.tog;st.open=st.open.includes(k)?st.open.filter(x=>x!==k):[...st.open,k];addRecent(metrics.find(m=>m.k===k).t);save();cards()});document.querySelectorAll('input[data-key]').forEach(i=>i.oninput=()=>{let r=i.value.replaceAll(',','');if(!valid(r)){i.value=fin(st.v[i.dataset.key]);return}st.v[i.dataset.key]=r;if(['cfo','capex'].includes(i.dataset.key))delete st.v.fcf;if(['marketCap','debt','cash'].includes(i.dataset.key))delete st.v.ev;if(['assetValue','liabilityValue'].includes(i.dataset.key))delete st.v.nav;save();cards()});document.querySelectorAll('[data-proc]').forEach(b=>b.onclick=()=>{let k=b.dataset.proc;st.proc=st.proc.includes(k)?st.proc.filter(x=>x!==k):[...st.proc,k];save();cards()});document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(b.dataset.copy);toast('복사됨')})}
search.value=st.q;search.oninput=e=>{st.q=e.target.value;save();cards()};clearRecent.onclick=()=>{st.recent=[];save();recent()};collapseAll.onclick=()=>{st.open=[];save();cards()};resetAll.onclick=()=>{st={...def(),recent:st.recent};localStorage.removeItem('nanomize_state');search.value='';render();toast('초기화됨')};render();
</script>
</body>
</html>
