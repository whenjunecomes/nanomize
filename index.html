<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NANOMIZE</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f8fafc;
padding:40px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-size:32px;
font-weight:900;
}

.search{
padding:12px;
width:250px;
border-radius:12px;
border:1px solid #ddd;
}

.card{
background:white;
padding:25px;
border-radius:20px;
border:1px solid #e2e8f0;
margin-bottom:20px;
}

.result{
font-size:40px;
font-weight:bold;
color:#2563eb;
margin-top:20px;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
margin-top:10px;
margin-bottom:10px;
font-size:16px;
}

button{
padding:10px 15px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
cursor:pointer;
}

.hidden{
display:none;
}
</style>

</head>

<body>

<div class="header">

<div class="logo">
NANOMIZE
</div>

<input class="search" placeholder="지표 검색">

</div>


<div class="card">

<h2>PER</h2>

<label>시가총액</label>
<input id="marketCap">

<label>순이익</label>
<input id="income">

<div class="result" id="result">
-
</div>

<button onclick="toggleCalc()">
계산 과정 보기
</button>

<div id="calc" class="hidden">

<hr>

<div id="formula">

</div>

</div>

</div>


<script>

function formatNumber(num){

return Number(num).toLocaleString()

}

function calculate(){

let market=
document.getElementById(
"marketCap"
).value.replaceAll(",","")

let income=
document.getElementById(
"income"
).value.replaceAll(",","")

if(
market &&
income &&
income!=0
){

let result=
market/income

document.getElementById(
"result"
).innerText=
result.toFixed(2)+"x"

document.getElementById(
"formula"
).innerText=
"PER = "+
formatNumber(market)
+" ÷ "+
formatNumber(income)
+" = "+
result.toFixed(2)+"x"

}

}

function toggleCalc(){

document
.getElementById("calc")
.classList
.toggle("hidden")

}

document
.getElementById("marketCap")
.addEventListener(
"input",
calculate
)

document
.getElementById("income")
.addEventListener(
"input",
calculate
)

</script>

</body>
</html>
