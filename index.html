<!DOCTYPE html>
<html lang="ko">
<head>

<title>NANOMIZE</title>
<style>
:root{--b:#2563eb;--bs:#eff6ff;--t:#0f172a;--m:#64748b;--l:#e2e8f0;--bg:#f8fafc}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif}button,input{font-family:inherit}
.top{height:72px;background:rgba(255,255,255,.96);border-bottom:1px solid var(--l);position:sticky;top:0;z-index:20;backdrop-filter:blur(12px)}.topin{max-width:1500px;margin:auto;height:100%;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:18px}.logo{font-size:30px;font-weight:950;letter-spacing:-.055em;color:#000}
.search{position:relative;width:390px}.search span{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#94a3b8}.search input{width:100%;height:44px;border:1px solid var(--l);border-radius:16px;background:#f8fafc;padding:0 14px 0 40px;outline:0}.search input:focus,.field input:focus{border-color:var(--b);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.units{display:flex;align-items:center;gap:8px}.units b{font-size:13px}.utabs{display:flex;border:1px solid var(--l);border-radius:14px;overflow:hidden;background:white}.utabs button{border:0;border-right:1px solid var(--l);background:white;padding:11px 15px;font-weight:800;color:#475569;cursor:pointer}.utabs button.on{background:var(--b);color:#fff}.utabs button:last-child{border-right:0}
.app{max-width:1500px;margin:auto;padding:24px;display:grid;grid-template-columns:230px 1fr;gap:22px}.side{position:sticky;top:96px;height:calc(100vh - 120px);display:flex;flex-direction:column;gap:16px}.panel,.head,.card{background:white;border:1px solid var(--l);box-shadow:0 1px 3px rgba(15,23,42,.04)}.panel{border-radius:28px;padding:12px}.nav{width:100%;border:0;background:transparent;border-radius:18px;padding:14px;margin-bottom:5px;display:flex;justify-content:space-between;color:#475569;font-size:14px;font-weight:850;cursor:pointer}.nav:hover{background:#f8fafc}.nav.on{background:var(--bs);color:var(--b)}.count{font-size:12px;background:#f1f5f9;border-radius:999px;padding:2px 8px;color:#64748b}.nav.on .count{background:white;color:var(--b)}
.rt{display:flex;justify-content:space-between;padding:4px 4px 10px;font-weight:900;font-size:14px}.ri{display:block;width:100%;border:0;background:transparent;border-radius:14px;padding:9px 10px;text-align:left;color:#64748b;font-size:14px;font-weight:650;cursor:pointer}.ri:hover{background:#f8fafc;color:var(--b)}.note{margin-top:auto;color:#94a3b8;font-size:12px;line-height:1.5;padding:0 6px 6px}
.bar{display:flex;gap:12px;margin-bottom:14px}.head{flex:1;border-radius:28px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between}.ht{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:950}.dot{width:10px;height:10px;border-radius:50%;background:var(--b)}.hc{font-size:14px;color:var(--m)}.mini{display:flex;gap:8px}.mini button{height:48px;border:1px solid var(--l);border-radius:18px;background:white;color:#475569;padding:0 14px;font-weight:850;cursor:pointer}
.cards{display:flex;flex-direction:column;gap:12px}.card{border-radius:24px;overflow:visible}.ctop{width:100%;border:0;background:transparent;padding:17px 20px;display:flex;align-items:center;justify-content:space-between;text-align:left;cursor:pointer}.cl{display:flex;align-items:center;gap:12px}.stat{width:10px;height:10px;border:1px solid #cbd5e1;background:white;border-radius:50%;flex:0 0 auto}.stat.done{background:var(--b);border-color:var(--b)}.name{font-size:18px;font-weight:950;white-space:nowrap}.badge{font-size:12px;font-weight:850;color:var(--b);background:var(--bs);border-radius:999px;padding:5px 9px}.closed{color:var(--b);font-size:18px;font-weight:950}.chev{font-size:18px;color:#64748b}
.tipw{position:relative;display:inline-flex}.q{width:17px;height:17px;border:1px solid #cbd5e1;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#94a3b8;font-size:11px;font-weight:900}.tipw:hover .q{color:var(--b);border-color:var(--b)}.tip{display:none;position:absolute;left:0;top:27px;width:340px;max-width:calc(100vw - 32px);background:#fff;border:1px solid var(--l);border-radius:16px;padding:12px;color:#64748b;font-size:12px;line-height:1.55;box-shadow:0 18px 40px rgba(15,23,42,.12);z-index:50}.tip:before{content:"";position:absolute;top:-6px;left:13px;width:10px;height:10px;background:#fff;border-left:1px solid var(--l);border-top:1px solid var(--l);transform:rotate(45deg)}.tipw:hover .tip{display:block}
.body{display:none;grid-template-columns:minmax(0,1fr) 360px;gap:24px;border-top:1px solid #f1f5f9;padding:20px}.card.open .body{display:grid}.inputs{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.field label{display:flex;gap:5px;align-items:center;color:var(--m);font-size:12px;font-weight:750;margin-bottom:6px}.field input{width:100%;height:42px;border:1px solid var(--l);border-radius:14px;outline:0;padding:0 12px;font-size:14px;background:#fff}.unit{font-size:11px;color:#94a3b8;margin-top:4px}.link{color:var(--b);font-size:13px;font-weight:950}.linkcap{color:#64748b;font-size:11px}
.resbox{border-left:1px solid #f1f5f9;padding-left:22px}.resrow{display:flex;align-items:center;justify-content:space-between}.res{color:var(--b);font-size:34px;font-weight:950;letter-spacing:-.04em}.copy{width:39px;height:39px;border:1px solid var(--l);background:#fff;color:#64748b;border-radius:13px;font-weight:900;cursor:pointer}.formula{color:var(--m);font-size:12px;margin-top:3px}.procbtn{border:1px solid var(--l);background:#fff;padding:9px 12px;margin-top:16px;color:#475569;font-size:12px;font-weight:850;border-radius:13px;cursor:pointer}.proc{max-height:0;overflow:hidden;opacity:0;transition:.22s}.proc.show{max-height:220px;opacity:1;margin-top:12px}.procin{background:#f8fafc;border-radius:16px;padding:13px;color:#64748b;font-size:12px;line-height:1.65;white-space:pre-line}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#0f172a;color:#fff;padding:11px 16px;border-radius:999px;font-size:13px;font-weight:850;opacity:0;pointer-events:none;transition:.18s;z-index:999}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.ms{display:none;margin-bottom:12px}.ms input{width:100%;height:44px;border:1px solid var(--l);border-radius:16px;padding:0 14px;background:white}
@media(max-width:1120px){.app{grid-template-columns:1fr;padding:16px}.side{position:static;height:auto;order:2}.search{display:none}.ms{display:block}.units b{display:none}.body{grid-template-columns:1fr}.resbox{border-left:0;border-top:1px solid #f1f5f9;padding-left:0;padding-top:18px}.inputs{grid-template-columns:1fr 1fr}.bar{flex-direction:column}.mini{display:grid;grid-template-columns:1fr 1fr}}
@media(max-width:650px){.topin{padding:0 16px}.logo{font-size:24px}.utabs button{padding:10px;font-size:12px}.inputs{grid-template-columns:1fr}.name{font-size:16px}.badge{display:none}.res{font-size:30px}}
</style>
</head>
<body>
<header class="top"><div class="topin"><div class="logo">NANOMIZE</div><div style="display:flex;align-items:center;gap:14px"><div class="search"><span>⌕</span><input id="search" placeholder="지표 검색 예: ROIC, EV/FCF, CAPE"></div><div class="units"><b>단위</b><div class="utabs" id="unitTabs"></div></div></div></div></header>
<main class="app"><aside class="side"><div class="panel" id="groups"></div><div class="panel"><div class="rt"><span>최근 열람</span><button id="clearRecent" style="border:0;background:transparent;color:#94a3b8;cursor:pointer;font-size:18px">×</button></div><div id="recent"></div></div><div class="note">FCF, EV, NAV는 계산되면 관련 지표에 자동 연결됩니다.<br>새로 접속하면 입력값은 초기화됩니다.</div></aside><section class="content"><div class="ms"><input id="mobileSearch" placeholder="지표 검색 예: ROIC, EV/FCF, CAPE"></div><div class="bar"><div class="head"><div class="ht"><span class="dot"></span><span id="sectionTitle">핵심</span></div><div class="hc" id="sectionCount">0개 지표</div></div><div class="mini"><button id="collapseAll">모두 접기</button><button id="resetAll">초기화</button></div></div><div class="cards" id="cards"></div></section></main><div class="toast" id="toast">복사됨</div>
<script>
const units=[['원',1],['억',1e8],['조',1e12],['백만달러',1e6]],groups=['핵심','현금흐름','퀄리티','퀀트','성장/SaaS','거시','업종'];
let st=loadState();
function D(){return{g:'핵심',q:'',v:{},u:1,open:['per','fcf'],proc:[],recent:['PER','ROIC','EV/EBITDA','FCF Yield','EV/FCF']}}
function loadState(){
  localStorage.removeItem('nanomize_state_v3');
  return D();
}
function save(){}function raw(v){let x=Number(String(v||'').replaceAll(',',''));return Number.isFinite(x)?x:0}function A(k){return raw(st.v[k])*units[st.u][1]}function R(k){return raw(st.v[k])}function divA(a,b){let y=A(b);return y===0?null:A(a)/y}function divR(a,b){let y=R(b);return y===0?null:R(a)/y}function pct(a,b){let r=divA(a,b);return r===null?null:r*100}function fmt(v,s=''){return(v===null||v===undefined||Number.isNaN(v)||!Number.isFinite(v))?'-':v.toLocaleString(undefined,{maximumFractionDigits:2})+s}
function fin(v){let r=String(v||'').replaceAll(',','');if(r==='')return'';if(r==='-')return'-';let neg=r[0]==='-',u=neg?r.slice(1):r,p=u.split('.'),i=p[0],d=p.length>1?p.slice(1).join(''):null,o='';while(i.length>3){o=','+i.slice(-3)+o;i=i.slice(0,-3)}return(neg?'-':'')+i+o+(d!==null?'.'+d:'')}function valid(t){return t===''||t==='-'||/^-?\d*\.?\d*$/.test(t)}function has(v){return String(v||'').trim()!==''&&String(v||'').trim()!=='-'}function unit(type){return type==='amount'?units[st.u][0]:type==='percent'?'%':''}
const M=[
['핵심','per','PER','시가총액 / 순이익',[['marketCap','시가총액','amount'],['netIncome','순이익','amount']],'x',()=>divA('marketCap','netIncome'),'순이익 대비 시장가치를 보는 대표 지표입니다.'],
['핵심','forwardPer','Forward PER','주가 / 예상 EPS',[['price','주가','amount'],['forwardEps','예상 EPS','amount']],'x',()=>divA('price','forwardEps'),'예상 EPS 기준으로 앞으로의 이익 대비 현재 주가를 봅니다.'],
['핵심','peg','PEG','PER / EPS 성장률',[['perInput','PER','plain'],['epsGrowth','EPS 성장률','percent']],'x',()=>divR('perInput','epsGrowth'),'성장률로 PER을 보정하는 지표입니다.'],
['핵심','pegy','PEGY','PER / (성장률 + 배당수익률)',[['perInput','PER','plain'],['epsGrowth','성장률','percent'],['dividendYieldInput','배당수익률','percent']],'x',()=>{let y=R('epsGrowth')+R('dividendYieldInput');return y?R('perInput')/y:null},'성장과 배당을 함께 고려합니다.'],
['핵심','pbr','PBR','시가총액 / 자기자본',[['marketCap','시가총액','amount'],['equity','자기자본','amount']],'x',()=>divA('marketCap','equity'),'장부상 순자산 대비 시장가치를 봅니다.'],
['핵심','ptbv','P/TBV','시가총액 / 유형자본',[['marketCap','시가총액','amount'],['tangibleBook','유형자본','amount']],'x',()=>divA('marketCap','tangibleBook'),'무형자산을 제외한 유형자본 대비 가격입니다.'],
['핵심','ev','EV','시가총액 + 총부채 - 현금',[['marketCap','시가총액','amount'],['debt','총부채','amount'],['cash','현금','amount']],'' ,()=>A('marketCap')+A('debt')-A('cash'),'기업 전체 가격입니다. EV 배수의 기본값입니다.'],
['핵심','evEbitda','EV/EBITDA','EV / EBITDA',[['ev','EV','amount'],['ebitda','EBITDA','amount']],'x',()=>divA('ev','ebitda'),'M&A와 기관투자에서 매우 자주 쓰입니다.'],
['핵심','evEbit','EV/EBIT','EV / 영업이익',[['ev','EV','amount'],['ebit','영업이익','amount']],'x',()=>divA('ev','ebit'),'CAPEX 부담을 더 보수적으로 반영합니다.'],
['핵심','evFcf','EV/FCF','EV / FCF',[['ev','EV','amount'],['fcf','FCF','amount']],'x',()=>divA('ev','fcf'),'현금흐름 기준의 보수적 EV 배수입니다.'],
['핵심','evNopat','EV/NOPAT','EV / NOPAT',[['ev','EV','amount'],['nopat','NOPAT','amount']],'x',()=>divA('ev','nopat'),'세후 영업이익 기준의 EV 배수입니다.'],

['현금흐름','fcf','FCF','영업현금흐름 - CAPEX',[['cfo','영업현금흐름','amount'],['capex','CAPEX','amount']],'' ,()=>A('cfo')-A('capex'),'현금흐름 분석의 출발점입니다.'],
['현금흐름','fcfYield','FCF Yield','FCF / 시가총액',[['fcf','FCF','amount'],['marketCap','시가총액','amount']],'% ',()=>pct('fcf','marketCap'),'시가총액 대비 현금창출력을 봅니다.'],
['현금흐름','pFcf','P/FCF','시가총액 / FCF',[['marketCap','시가총액','amount'],['fcf','FCF','amount']],'x',()=>divA('marketCap','fcf'),'FCF 기준 PER 대체 지표입니다.'],
['현금흐름','cfoYield','CFO Yield','영업현금흐름 / 시가총액',[['cfo','영업현금흐름','amount'],['marketCap','시가총액','amount']],'% ',()=>pct('cfo','marketCap'),'영업현금흐름의 질을 봅니다.'],
['현금흐름','croicCash','CROIC','FCF / 투자자본',[['fcf','FCF','amount'],['investedCapital','투자자본','amount']],'% ',()=>pct('fcf','investedCapital'),'투자자본 대비 현금창출력을 봅니다.'],
['현금흐름','dcfTv','DCF Terminal Value','내년 FCF / (WACC - 영구성장률)',[['nextFcf','내년 FCF','amount'],['wacc','WACC','percent'],['terminalGrowth','영구성장률','percent']],'' ,()=>{let s=R('wacc')-R('terminalGrowth');return s>0?A('nextFcf')/(s/100):null},'DCF의 영구가치 계산입니다.'],

['퀄리티','roic','ROIC','NOPAT / 투자자본',[['nopat','NOPAT','amount'],['investedCapital','투자자본','amount']],'% ',()=>pct('nopat','investedCapital'),'자본효율성과 장기 경쟁력을 봅니다.'],
['퀄리티','roce','ROCE','EBIT / 사용 자본',[['ebit','EBIT','amount'],['capitalEmployed','사용 자본','amount']],'% ',()=>pct('ebit','capitalEmployed'),'유럽 기관과 제조업 분석에서 자주 사용합니다.'],
['퀄리티','roiic','ROIIC','증가 NOPAT / 증가 투자자본',[['deltaNopat','증가 NOPAT','amount'],['deltaInvestedCapital','증가 투자자본','amount']],'% ',()=>pct('deltaNopat','deltaInvestedCapital'),'신규 투자의 수익률을 봅니다.'],
['퀄리티','roe','ROE','순이익 / 자기자본',[['netIncome','순이익','amount'],['equity','자기자본','amount']],'% ',()=>pct('netIncome','equity'),'자기자본 대비 이익률입니다.'],
['퀄리티','roa','ROA','순이익 / 총자산',[['netIncome','순이익','amount'],['assets','총자산','amount']],'% ',()=>pct('netIncome','assets'),'총자산 대비 수익성을 봅니다.'],
['퀄리티','eva','EVA','NOPAT - 투자자본 × WACC',[['nopat','NOPAT','amount'],['investedCapital','투자자본','amount'],['wacc','WACC','percent']],'' ,()=>A('nopat')-A('investedCapital')*R('wacc')/100,'자본비용을 차감한 경제적 부가가치입니다.'],
['퀄리티','roicWacc','ROIC - WACC','ROIC - WACC',[['roicInput','ROIC','percent'],['wacc','WACC','percent']],'%p',()=>R('roicInput')-R('wacc'),'자본비용 대비 초과수익률을 봅니다.'],
['퀄리티','grossMargin','매출총이익률','매출총이익 / 매출',[['grossProfit','매출총이익','amount'],['revenue','매출','amount']],'% ',()=>pct('grossProfit','revenue'),'가격 결정력과 원가 구조를 봅니다.'],
['퀄리티','operatingMargin','영업이익률','영업이익 / 매출',[['ebit','영업이익','amount'],['revenue','매출','amount']],'% ',()=>pct('ebit','revenue'),'본업의 수익성을 봅니다.'],
['퀄리티','accrualRatio','Accrual Ratio','(순이익 - 영업현금흐름) / 총자산',[['netIncome','순이익','amount'],['cfo','영업현금흐름','amount'],['assets','총자산','amount']],'% ',()=>{let y=A('assets');return y?((A('netIncome')-A('cfo'))/y*100):null},'회계이익과 현금흐름의 괴리를 봅니다.'],

['퀀트','bookToMarket','Book-to-Market','장부가 / 시가총액',[['equity','장부가','amount'],['marketCap','시가총액','amount']],'x',()=>divA('equity','marketCap'),'Fama-French 가치 팩터의 핵심입니다.'],
['퀀트','earningsYield','Earnings Yield','순이익 / 시가총액',[['netIncome','순이익','amount'],['marketCap','시가총액','amount']],'% ',()=>pct('netIncome','marketCap'),'PER의 역수로 채권금리와 비교할 수 있습니다.'],
['퀀트','eySpread','Earnings Yield Spread','Earnings Yield - 10년 국채금리',[['earningsYieldInput','Earnings Yield','percent'],['bondYield','10년 국채금리','percent']],'%p',()=>R('earningsYieldInput')-R('bondYield'),'주식·채권 상대가치에 사용합니다.'],
['퀀트','momentum','Momentum 12-1','12개월 수익률 - 최근 1개월 수익률',[['return12m','12개월 수익률','percent'],['return1m','최근 1개월 수익률','percent']],'% ',()=>R('return12m')-R('return1m'),'퀀트 모멘텀 팩터입니다.'],
['퀀트','beta','Beta','주식 민감도 / 시장 민감도',[['stockSensitivity','주식 민감도','plain'],['marketSensitivity','시장 민감도','plain']],'' ,()=>divR('stockSensitivity','marketSensitivity'),'시장 대비 주가 민감도를 봅니다.'],
['퀀트','lowVol','Low Volatility','1 / 변동성',[['volatility','변동성','percent']],'' ,()=>{let v=R('volatility');return v?1/v:null},'저변동성 팩터를 단순화한 지표입니다.'],

['성장/SaaS','revenueCagr','Revenue CAGR','(최종 매출 / 초기 매출)^(1/년수)-1',[['revenueEnd','최종 매출','amount'],['revenueStart','초기 매출','amount'],['years','년수','plain']],'% ',()=>{let s=A('revenueStart'),e=A('revenueEnd'),y=R('years');return s>0&&y>0?(Math.pow(e/s,1/y)-1)*100:null},'매출의 연평균 성장률입니다.'],
['성장/SaaS','evRevenue','EV/Revenue','EV / 매출',[['ev','EV','amount'],['revenue','매출','amount']],'x',()=>divA('ev','revenue'),'이익이 작은 성장기업에서 많이 사용합니다.'],
['성장/SaaS','evArr','EV/ARR','EV / ARR',[['ev','EV','amount'],['arr','ARR','amount']],'x',()=>divA('ev','arr'),'SaaS 반복매출 대비 기업가치를 봅니다.'],
['성장/SaaS','evMrr','EV/MRR Annualized','EV / (MRR×12)',[['ev','EV','amount'],['mrr','MRR','amount']],'x',()=>{let y=A('mrr')*12;return y?A('ev')/y:null},'월 반복매출을 연환산합니다.'],
['성장/SaaS','rule40','Rule of 40','매출성장률 + FCF 마진',[['revenueGrowth','매출성장률','percent'],['fcfMargin','FCF 마진','percent']],'% ',()=>R('revenueGrowth')+R('fcfMargin'),'SaaS 성장성과 수익성을 함께 봅니다.'],
['성장/SaaS','nrr','NRR','기존 고객 현재 매출 / 기존 고객 과거 매출',[['currentExistingRevenue','기존 고객 현재 매출','amount'],['priorExistingRevenue','기존 고객 과거 매출','amount']],'% ',()=>pct('currentExistingRevenue','priorExistingRevenue'),'기존 고객 매출 유지·확장을 봅니다.'],
['성장/SaaS','ltvCac','LTV/CAC','LTV / CAC',[['ltv','LTV','amount'],['cac','CAC','amount']],'x',()=>divA('ltv','cac'),'고객가치 대비 고객획득비용입니다.'],
['성장/SaaS','cacPayback','CAC Payback','CAC / 고객당 월이익',[['cac','CAC','amount'],['monthlyGrossProfit','고객당 월이익','amount']],'개월',()=>divA('cac','monthlyGrossProfit'),'CAC 회수기간입니다.'],

['거시','cape','Shiller CAPE','현재가격 / 10년 평균 실질 EPS',[['price','현재가격','amount'],['avgRealEps10y','10년 평균 실질 EPS','amount']],'x',()=>divA('price','avgRealEps10y'),'장기 시장 밸류에이션에 사용합니다.'],
['거시','buffett','Buffett Indicator','주식시장 시가총액 / GDP',[['totalMarketCap','주식시장 시가총액','amount'],['gdp','GDP','amount']],'% ',()=>pct('totalMarketCap','gdp'),'시장 전체 규모를 경제 규모와 비교합니다.'],
['거시','tobinQ',"Tobin's Q",'시장가치 / 자산 대체비용',[['marketValue','시장가치','amount'],['replacementCost','자산 대체비용','amount']],'x',()=>divA('marketValue','replacementCost'),'시장가치와 대체비용을 비교합니다.'],
['거시','erp','ERP','주식 기대수익률 - 무위험금리',[['expectedEquityReturn','주식 기대수익률','percent'],['riskFreeRate','무위험금리','percent']],'%p',()=>R('expectedEquityReturn')-R('riskFreeRate'),'주식의 요구 초과수익률입니다.'],
['거시','fedModel','Fed Model Spread','Earnings Yield - 10년 국채금리',[['earningsYieldInput','Earnings Yield','percent'],['bondYield','10년 국채금리','percent']],'%p',()=>R('earningsYieldInput')-R('bondYield'),'주식·채권 상대가치 비교입니다.'],
['거시','bei','TIPS Spread / BEI','명목국채금리 - TIPS 금리',[['nominalYield','명목국채금리','percent'],['tipsYield','TIPS 금리','percent']],'%p',()=>R('nominalYield')-R('tipsYield'),'기대 인플레이션을 봅니다.'],

['업종','nav','NAV','자산가치 - 부채가치',[['assetValue','자산가치','amount'],['liabilityValue','부채가치','amount']],'' ,()=>A('assetValue')-A('liabilityValue'),'자산주·지주사·부동산의 기본입니다.'],
['업종','pNav','P/NAV','시가총액 / NAV',[['marketCap','시가총액','amount'],['nav','NAV','amount']],'x',()=>divA('marketCap','nav'),'리츠·부동산·지주사에서 사용합니다.'],
['업종','navDiscount','NAV 할인율','1 - 시가총액 / NAV',[['marketCap','시가총액','amount'],['nav','NAV','amount']],'% ',()=>{let r=divA('marketCap','nav');return r===null?null:(1-r)*100},'NAV 대비 시장가격의 괴리를 봅니다.'],
['업종','sotpDiscount','SOTP 할인율','1 - 시가총액 / SOTP',[['marketCap','시가총액','amount'],['sotp','SOTP 합산가치','amount']],'% ',()=>{let r=divA('marketCap','sotp');return r===null?null:(1-r)*100},'복합기업·지주사 분석에 사용합니다.'],
['업종','pFfo','P/FFO','시가총액 / FFO',[['marketCap','시가총액','amount'],['ffo','FFO','amount']],'x',()=>divA('marketCap','ffo'),'REIT 운영현금흐름 기준 지표입니다.'],
['업종','pAffo','P/AFFO','시가총액 / AFFO',[['marketCap','시가총액','amount'],['affo','AFFO','amount']],'x',()=>divA('marketCap','affo'),'REIT 배당 지속가능성에 유용합니다.'],
['업종','capRate','Cap Rate','NOI / 부동산 가치',[['noi','NOI','amount'],['propertyValue','부동산 가치','amount']],'% ',()=>pct('noi','propertyValue'),'부동산 수익률 핵심 지표입니다.'],
['업종','evReserve','EV/Reserve','EV / 매장량',[['ev','EV','amount'],['reserve','매장량','plain']],'' ,()=>{let y=R('reserve');return y?A('ev')/y:null},'에너지·광업 보유량 대비 기업가치입니다.'],
['업종','evBoe','EV/BOE','EV / BOE',[['ev','EV','amount'],['boe','BOE','plain']],'' ,()=>{let y=R('boe');return y?A('ev')/y:null},'석유·가스 기업에서 사용합니다.'],
['업종','rnpv','rNPV','NPV × 성공확률',[['npv','NPV','amount'],['successProbability','성공확률','percent']],'' ,()=>A('npv')*R('successProbability')/100,'바이오 파이프라인 위험조정 가치입니다.']
].map(x=>({g:x[0],k:x[1],t:x[2],f:x[3],fs:x[4],s:x[5],c:x[6],i:x[7]}));

function comp(k){let m=M.find(x=>x.k===k);return m?m.c():null}function sync(){let ev=comp('ev');if(!has(st.v.ev)&&Number.isFinite(ev))st.v.ev=String(ev/units[st.u][1]);let f=comp('fcf');if(!has(st.v.fcf)&&Number.isFinite(f))st.v.fcf=String(f/units[st.u][1]);let n=comp('nav');if(!has(st.v.nav)&&Number.isFinite(n))st.v.nav=String(n/units[st.u][1])}
function addRecent(t){st.recent=[t,...st.recent.filter(x=>x!==t)].slice(0,7);save();recent()}function toast(t){let e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1100)}
function render(){sync();unitUI();groupUI();recent();cards()}function unitUI(){unitTabs.innerHTML=units.map((u,i)=>`<button class="${i===st.u?'on':''}" data-u="${i}">${u[0]}</button>`).join('');document.querySelectorAll('[data-u]').forEach(b=>b.onclick=()=>{st.u=+b.dataset.u;save();render()})}
function groupUI(){groupsEl=document.getElementById('groups');groupsEl.innerHTML=groups.map(g=>`<button class="nav ${g===st.g?'on':''}" data-g="${g}"><span>${g}</span><span class="count">${M.filter(m=>m.g===g).length}</span></button>`).join('');document.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>{st.g=b.dataset.g;st.q='';setSearch('');save();render()})}
function recent(){recentEl.innerHTML=st.recent.length?st.recent.map(r=>`<button class="ri" data-r="${r}">${r}</button>`).join(''):'<div style="color:#94a3b8;font-size:13px;padding:8px">최근 열람 없음</div>';document.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>{let m=M.find(x=>x.t===b.dataset.r);if(m)st.g=m.g;st.q=b.dataset.r;setSearch(st.q);save();render()})}
function cards(){sync();let q=(st.q||'').toLowerCase().trim(),list=M.filter(m=>m.g===st.g&&(!q||m.t.toLowerCase().includes(q)||m.f.toLowerCase().includes(q)));sectionTitle.textContent=st.g;sectionCount.textContent=`${list.length}개 지표`;document.getElementById('cards').innerHTML=list.map(card).join('')||'<div class="panel" style="padding:24px;color:#64748b">검색 결과가 없습니다.</div>';events()}
function card(m){let c=m.c(),done=c!==null&&c!==undefined&&Number.isFinite(c),open=st.open.includes(m.k),po=st.proc.includes(m.k);let inputs=m.fs.map(([k,l,type])=>{let linked=(k==='fcf'||k==='ev'||k==='nav')&&has(st.v[k]);return`<div class="field"><label>${l} ${linked?'<span class="link">↗</span><span class="linkcap">자동 연결</span>':''}</label><input data-key="${k}" value="${fin(st.v[k])}" placeholder="0"><div class="unit">${unit(type)}</div></div>`}).join('');let proc=procText(m);return`<div class="card ${open?'open':''}"><button class="ctop" data-tog="${m.k}"><div class="cl"><span class="stat ${done?'done':''}" data-status="${m.k}"></span><span class="name">${m.t}</span><span class="tipw"><span class="q">?</span><span class="tip">${m.i}</span></span><span class="badge">입력 ${m.fs.length}개</span></div><div style="display:flex;align-items:center;gap:16px">${!open?`<span class="closed" data-closed="${m.k}">${fmt(c,m.s)}</span>`:''}<span class="chev">${open?'⌃':'⌄'}</span></div></button><div class="body"><div class="inputs">${inputs}</div><div class="resbox"><div class="resrow"><div class="res" data-result="${m.k}">${fmt(c,m.s)}</div><button class="copy" data-copy="${fmt(c,m.s)}" data-copy-key="${m.k}">⧉</button></div><div class="formula">${m.f}</div><button class="procbtn" data-proc="${m.k}">${po?'계산 과정 숨기기':'계산 과정 보기'}⌄</button><div class="proc ${po?'show':''}"><div class="procin" data-process-text="${m.k}">${proc}</div></div></div></div></div>`}
function procText(m){let c=m.c();return m.fs.map(([k,l,type])=>`${l}: ${has(st.v[k])?fin(st.v[k])+' '+unit(type):'미입력'}`).join('\n')+`\n\n${m.t} = ${m.f}\n= ${fmt(c,m.s)}`}
function update(){sync();M.forEach(m=>{let c=m.c(),done=c!==null&&c!==undefined&&Number.isFinite(c);document.querySelectorAll(`[data-result="${m.k}"]`).forEach(e=>e.textContent=fmt(c,m.s));document.querySelectorAll(`[data-closed="${m.k}"]`).forEach(e=>e.textContent=fmt(c,m.s));document.querySelectorAll(`[data-status="${m.k}"]`).forEach(e=>e.classList.toggle('done',done));document.querySelectorAll(`[data-copy-key="${m.k}"]`).forEach(e=>e.dataset.copy=fmt(c,m.s));document.querySelectorAll(`[data-process-text="${m.k}"]`).forEach(e=>e.textContent=procText(m))});document.querySelectorAll('input[data-key]').forEach(i=>{if(document.activeElement===i)return;i.value=fin(st.v[i.dataset.key])})}
function fmtActive(i){let before=i.value,cursor=i.selectionStart||before.length,left=before.slice(0,cursor).replaceAll(',',''),rv=before.replaceAll(',','');if(!valid(rv)){i.value=fin(st.v[i.dataset.key]);return null}i.value=fin(rv);let nc=0,rc=0;while(nc<i.value.length&&rc<left.length){if(i.value[nc]!==',')rc++;nc++}i.setSelectionRange(nc,nc);return rv}
function events(){document.querySelectorAll('[data-tog]').forEach(b=>b.onclick=e=>{if(e.target.closest('.tipw'))return;let k=b.dataset.tog;st.open=st.open.includes(k)?st.open.filter(x=>x!==k):[...st.open,k];let m=M.find(x=>x.k===k);if(m)addRecent(m.t);save();cards()});document.querySelectorAll('input[data-key]').forEach(i=>i.oninput=()=>{let rv=fmtActive(i);if(rv===null)return;st.v[i.dataset.key]=rv;if(['cfo','capex'].includes(i.dataset.key))delete st.v.fcf;if(['marketCap','debt','cash'].includes(i.dataset.key))delete st.v.ev;if(['assetValue','liabilityValue'].includes(i.dataset.key))delete st.v.nav;save();update()});document.querySelectorAll('[data-proc]').forEach(b=>b.onclick=()=>{let k=b.dataset.proc;st.proc=st.proc.includes(k)?st.proc.filter(x=>x!==k):[...st.proc,k];save();cards()});document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(b.dataset.copy);toast('복사됨')})}
function setSearch(v){search.value=v;mobileSearch.value=v}search.oninput=e=>{st.q=e.target.value;mobileSearch.value=st.q;save();cards()};mobileSearch.oninput=e=>{st.q=e.target.value;search.value=st.q;save();cards()};clearRecent.onclick=()=>{st.recent=[];save();recent()};collapseAll.onclick=()=>{st.open=[];save();cards()};resetAll.onclick=()=>{st=D();setSearch('');render();toast('초기화됨')};setSearch('');render();
</script>
</body>
</html>
