<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NANOMIZE</title>
<style>
:root{--blue:#2563eb;--blueSoft:#eff6ff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--bg:#f8fafc}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",Arial,sans-serif}
button,input{font-family:inherit}
.top{height:72px;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:40;backdrop-filter:blur(12px)}
.topin{max-width:1500px;margin:auto;height:100%;padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.leftTop{display:flex;align-items:center;gap:14px}
.menuBtn{width:44px;height:44px;border:1px solid var(--line);background:white;border-radius:14px;font-size:24px;line-height:1;cursor:pointer;color:#0f172a}
.menuBtn:hover{border-color:#bfdbfe;color:var(--blue)}
.logo{font-size:30px;font-weight:950;letter-spacing:-.055em;color:#000}
.rightTop{display:flex;align-items:center;gap:14px}
.search{position:relative;width:390px}
.search span{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:#94a3b8}
.search input{width:100%;height:44px;border:1px solid var(--line);border-radius:16px;background:#f8fafc;padding:0 14px 0 40px;outline:0}
.search input:focus,.field input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.units{display:flex;align-items:center;gap:8px}.units b{font-size:13px}
.utabs{display:flex;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:white}
.utabs button{border:0;border-right:1px solid var(--line);background:white;padding:11px 15px;font-weight:800;color:#475569;cursor:pointer}
.utabs button:last-child{border-right:0}.utabs button.on{background:var(--blue);color:white}
.layout{max-width:1500px;margin:auto;padding:24px;display:grid;grid-template-columns:1fr;gap:16px}
.mobileSearch{display:none;margin-bottom:0}
.mobileSearch input{width:100%;height:44px;border:1px solid var(--line);border-radius:16px;padding:0 14px;background:white;outline:0}
.bar{display:flex;gap:12px;margin-bottom:14px}
.head,.card,.panel{background:white;border:1px solid var(--line);box-shadow:0 1px 3px rgba(15,23,42,.04)}
.head{flex:1;border-radius:28px;padding:18px 22px;display:flex;align-items:center;justify-content:space-between}
.ht{display:flex;align-items:center;gap:12px;font-size:22px;font-weight:950}
.dot{width:10px;height:10px;border-radius:50%;background:var(--blue)}
.hc{font-size:14px;color:var(--muted)}
.mini{display:flex;gap:8px}
.mini button{height:48px;border:1px solid var(--line);border-radius:18px;background:white;color:#475569;padding:0 14px;font-weight:850;cursor:pointer}
.mini button:hover{color:var(--blue);border-color:#bfdbfe}
.cards{display:flex;flex-direction:column;gap:12px}
.card{border-radius:24px;overflow:visible}
.ctop{width:100%;border:0;background:transparent;padding:17px 20px;display:flex;align-items:center;justify-content:space-between;text-align:left;cursor:pointer}
.cl{display:flex;align-items:center;gap:12px;min-width:0}
.stat{width:10px;height:10px;border:1px solid #cbd5e1;background:white;border-radius:50%;flex:0 0 auto}
.stat.done{background:var(--blue);border-color:var(--blue)}
.name{font-size:18px;font-weight:950;white-space:nowrap}
.badge{font-size:12px;font-weight:850;color:var(--blue);background:var(--blueSoft);border-radius:999px;padding:5px 9px;white-space:nowrap}
.closed{color:var(--blue);font-size:18px;font-weight:950}
.chev{font-size:18px;color:#64748b}
.tipw{position:relative;display:inline-flex}.q{width:17px;height:17px;border:1px solid #cbd5e1;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#94a3b8;font-size:11px;font-weight:900}
.tipw:hover .q{color:var(--blue);border-color:var(--blue)}
.tip{display:none;position:absolute;left:0;top:27px;width:340px;max-width:calc(100vw - 32px);background:white;border:1px solid var(--line);border-radius:16px;padding:12px;color:#64748b;font-size:12px;line-height:1.55;box-shadow:0 18px 40px rgba(15,23,42,.12);z-index:60}
.tip:before{content:"";position:absolute;top:-6px;left:13px;width:10px;height:10px;background:white;border-left:1px solid var(--line);border-top:1px solid var(--line);transform:rotate(45deg)}
.tipw:hover .tip{display:block}
.body{display:none;grid-template-columns:minmax(0,1fr) 360px;gap:24px;border-top:1px solid #f1f5f9;padding:20px}
.card.open .body{display:grid}
.inputs{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.field label{display:flex;gap:5px;align-items:center;color:var(--muted);font-size:12px;font-weight:750;margin-bottom:6px}
.field input{width:100%;height:42px;border:1px solid var(--line);border-radius:14px;outline:0;padding:0 12px;font-size:14px;background:white}
.unit{font-size:11px;color:#94a3b8;margin-top:4px}
.link{color:var(--blue);font-size:13px;font-weight:950}.linkcap{color:#64748b;font-size:11px}
.resbox{border-left:1px solid #f1f5f9;padding-left:22px}
.resrow{display:flex;align-items:center;justify-content:space-between;gap:12px}
.res{color:var(--blue);font-size:34px;font-weight:950;letter-spacing:-.04em}
.copy{width:39px;height:39px;border:1px solid var(--line);background:white;color:#64748b;border-radius:13px;font-weight:900;cursor:pointer}
.copy:hover{color:var(--blue);border-color:#bfdbfe}
.formula{color:var(--muted);font-size:12px;margin-top:3px}
.procbtn{border:1px solid var(--line);background:white;padding:9px 12px;margin-top:16px;color:#475569;font-size:12px;font-weight:850;border-radius:13px;cursor:pointer}
.procbtn:hover{color:var(--blue);border-color:#bfdbfe}
.proc{max-height:0;overflow:hidden;opacity:0;transition:.22s}
.proc.show{max-height:220px;opacity:1;margin-top:12px}
.procin{background:#f8fafc;border-radius:16px;padding:13px;color:#64748b;font-size:12px;line-height:1.65;white-space:pre-line}
.drawerOverlay{position:fixed;inset:0;background:rgba(15,23,42,.28);z-index:80;display:none}
.drawerOverlay.show{display:block}
.drawer{position:fixed;left:0;top:0;bottom:0;width:300px;background:white;border-right:1px solid var(--line);z-index:90;transform:translateX(-105%);transition:.2s ease;box-shadow:20px 0 60px rgba(15,23,42,.18);padding:18px;display:flex;flex-direction:column;gap:14px}
.drawer.show{transform:translateX(0)}
.drawerTop{display:flex;align-items:center;justify-content:space-between;padding-bottom:8px}
.drawerLogo{font-size:24px;font-weight:950;letter-spacing:-.055em;color:#000}
.closeBtn{width:38px;height:38px;border:1px solid var(--line);background:white;border-radius:12px;font-size:20px;cursor:pointer}
.nav{width:100%;border:0;background:transparent;border-radius:18px;padding:14px;margin-bottom:5px;display:flex;justify-content:space-between;color:#475569;font-size:14px;font-weight:850;cursor:pointer}
.nav:hover{background:#f8fafc}.nav.on{background:var(--blueSoft);color:var(--blue)}
.count{font-size:12px;background:#f1f5f9;border-radius:999px;padding:2px 8px;color:#64748b}.nav.on .count{background:white;color:var(--blue)}
.recentTitle{display:flex;justify-content:space-between;padding:4px 4px 10px;font-weight:900;font-size:14px}
.recentItem{display:block;width:100%;border:0;background:transparent;border-radius:14px;padding:9px 10px;text-align:left;color:#64748b;font-size:14px;font-weight:650;cursor:pointer}
.recentItem:hover{background:#f8fafc;color:var(--blue)}
.drawerNote{margin-top:auto;color:#94a3b8;font-size:12px;line-height:1.5}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:#0f172a;color:white;padding:11px 16px;border-radius:999px;font-size:13px;font-weight:850;opacity:0;pointer-events:none;transition:.18s;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:1120px){.search{display:none}.mobileSearch{display:block}.body{grid-template-columns:1fr}.resbox{border-left:0;border-top:1px solid #f1f5f9;padding-left:0;padding-top:18px}.inputs{grid-template-columns:1fr 1fr}.bar{flex-direction:column}.mini{display:grid;grid-template-columns:1fr 1fr}.layout{padding:16px}.units b{display:none}}
@media(max-width:650px){.topin{padding:0 16px}.logo{font-size:24px}.utabs button{padding:10px;font-size:12px}.inputs{grid-template-columns:1fr}.name{font-size:16px}.badge{display:none}.res{font-size:30px}.drawer{width:84vw}}
</style>
</head>
<body>
<header class="top">
  <div class="topin">
    <div class="leftTop">
      <button class="menuBtn" id="menuBtn">☰</button>
      <div class="logo">NANOMIZE</div>
    </div>
    <div class="rightTop">
      <div class="search"><span>⌕</span><input id="search" placeholder="지표 검색 예: ROIC, EV/FCF, CAPE"></div>
      <div class="units"><b>단위</b><div class="utabs" id="unitTabs"></div></div>
    </div>
  </div>
</header>

<div class="drawerOverlay" id="drawerOverlay"></div>
<aside class="drawer" id="drawer">
  <div class="drawerTop">
    <div class="drawerLogo">NANOMIZE</div>
    <button class="closeBtn" id="closeDrawer">×</button>
  </div>
  <div class="panel" id="groups"></div>
  <div class="panel">
    <div class="recentTitle"><span>최근 열람</span><button id="clearRecent" style="border:0;background:transparent;color:#94a3b8;cursor:pointer;font-size:18px">×</button></div>
    <div id="recent"></div>
  </div>
  <div class="drawerNote">FCF, EV, NAV는 계산되면 관련 지표에 자동 연결됩니다.<br>입력값은 새 접속 시 초기화됩니다.</div>
</aside>

<main class="layout">
  <section>
    <div class="mobileSearch"><input id="mobileSearch" placeholder="지표 검색 예: ROIC, EV/FCF, CAPE"></div>
    <div class="bar">
      <div class="head">
        <div class="ht"><span class="dot"></span><span id="sectionTitle">핵심</span></div>
        <div class="hc" id="sectionCount">0개 지표</div>
      </div>
      <div class="mini"><button id="collapseAll">모두 접기</button><button id="resetAll">초기화</button></div>
    </div>
    <div class="cards" id="cards"></div>
  </section>
</main>
<div class="toast" id="toast">복사됨</div>

<script>
const units=[['원',1],['억',1e8],['조',1e12],['백만달러',1e6]];
const groups=['핵심','현금흐름','퀄리티','퀀트','성장/SaaS','거시','업종'];
let st={g:'핵심',q:'',v:{},u:1,open:['per','fcf'],proc:[],recent:['PER','ROIC','EV/EBITDA','FCF Yield','EV/FCF']};

function raw(v){let x=Number(String(v||'').replaceAll(',',''));return Number.isFinite(x)?x:0}
function A(k){return raw(st.v[k])*units[st.u][1]}
function R(k){return raw(st.v[k])}
function divA(a,b){let y=A(b);return y===0?null:A(a)/y}
function divR(a,b){let y=R(b);return y===0?null:R(a)/y}
function pct(a,b){let r=divA(a,b);return r===null?null:r*100}
function fmt(v,s=''){return(v===null||v===undefined||Number.isNaN(v)||!Number.isFinite(v))?'-':v.toLocaleString(undefined,{maximumFractionDigits:2})+s}
function fin(v){let r=String(v||'').replaceAll(',','');if(r==='')return'';if(r==='-')return'-';let neg=r[0]==='-',u=neg?r.slice(1):r,p=u.split('.'),i=p[0],d=p.length>1?p.slice(1).join(''):null,o='';while(i.length>3){o=','+i.slice(-3)+o;i=i.slice(0,-3)}return(neg?'-':'')+i+o+(d!==null?'.'+d:'')}
function valid(t){return t===''||t==='-'||/^-?\d*\.?\d*$/.test(t)}
function has(v){return String(v||'').trim()!==''&&String(v||'').trim()!=='-'}
function unit(type){return type==='amount'?units[st.u][0]:type==='percent'?'%':''}

const metrics=[
{g:'핵심',k:'per',t:'PER',f:'시가총액 / 순이익',fs:[['marketCap','시가총액','amount'],['netIncome','순이익','amount']],s:'x',c:()=>divA('marketCap','netIncome'),i:'순이익 대비 시장가치를 보는 대표 지표입니다. 이익이 안정적인 기업 비교에 유용하지만 일회성 손익이나 경기 사이클에 영향을 받을 수 있습니다.'},
{g:'핵심',k:'forwardPer',t:'Forward PER',f:'주가 / 예상 EPS',fs:[['price','주가','amount'],['forwardEps','예상 EPS','amount']],s:'x',c:()=>divA('price','forwardEps'),i:'예상 EPS 기준으로 앞으로의 이익 대비 현재 주가를 봅니다. 애널리스트 리포트와 시장 컨센서스에서 자주 사용됩니다.'},
{g:'핵심',k:'peg',t:'PEG',f:'PER / EPS 성장률',fs:[['perInput','PER','plain'],['epsGrowth','EPS 성장률','percent']],s:'x',c:()=>divR('perInput','epsGrowth'),i:'PER을 성장률로 보정합니다. 성장주 비교에 유용하지만 성장률 추정에 민감합니다.'},
{g:'핵심',k:'pegy',t:'PEGY',f:'PER / (성장률 + 배당수익률)',fs:[['perInput','PER','plain'],['epsGrowth','성장률','percent'],['dividendYieldInput','배당수익률','percent']],s:'x',c:()=>{let y=R('epsGrowth')+R('dividendYieldInput');return y?R('perInput')/y:null},i:'성장과 배당을 함께 고려하는 PEG 변형 지표입니다.'},
{g:'핵심',k:'pbr',t:'PBR',f:'시가총액 / 자기자본',fs:[['marketCap','시가총액','amount'],['equity','자기자본','amount']],s:'x',c:()=>divA('marketCap','equity'),i:'장부상 순자산 대비 시장가치를 봅니다. 금융주, 지주사, 자산주에 자주 사용됩니다.'},
{g:'핵심',k:'ptbv',t:'P/TBV',f:'시가총액 / 유형자본',fs:[['marketCap','시가총액','amount'],['tangibleBook','유형자본','amount']],s:'x',c:()=>divA('marketCap','tangibleBook'),i:'무형자산을 제외한 유형자본 대비 가격입니다. 은행·금융주 분석에서 보수적으로 사용됩니다.'},
{g:'핵심',k:'ev',t:'EV',f:'시가총액 + 총부채 - 현금',fs:[['marketCap','시가총액','amount'],['debt','총부채','amount'],['cash','현금','amount']],s:'',c:()=>A('marketCap')+A('debt')-A('cash'),i:'주주가치와 채권자 몫을 함께 반영한 기업 전체 가격입니다. EV 배수의 기본 입력값입니다.'},
{g:'핵심',k:'evEbitda',t:'EV/EBITDA',f:'EV / EBITDA',fs:[['ev','EV','amount'],['ebitda','EBITDA','amount']],s:'x',c:()=>divA('ev','ebitda'),i:'자본구조와 감가상각 영향을 줄여 기업 간 비교가 쉽습니다. IB, PE, M&A에서 표준처럼 쓰입니다.'},
{g:'핵심',k:'evEbit',t:'EV/EBIT',f:'EV / 영업이익',fs:[['ev','EV','amount'],['ebit','영업이익','amount']],s:'x',c:()=>divA('ev','ebit'),i:'감가상각 부담까지 반영한 영업이익 배수입니다. 제조업·인프라에 유용합니다.'},
{g:'핵심',k:'evFcf',t:'EV/FCF',f:'EV / FCF',fs:[['ev','EV','amount'],['fcf','FCF','amount']],s:'x',c:()=>divA('ev','fcf'),i:'EV 기준으로 잉여현금흐름을 평가합니다. EV/EBITDA보다 보수적입니다.'},
{g:'핵심',k:'evNopat',t:'EV/NOPAT',f:'EV / NOPAT',fs:[['ev','EV','amount'],['nopat','NOPAT','amount']],s:'x',c:()=>divA('ev','nopat'),i:'세후 영업이익 기준의 EV 배수입니다. 세금 반영과 자본구조 중립성을 고려합니다.'},

{g:'현금흐름',k:'fcf',t:'FCF',f:'영업현금흐름 - CAPEX',fs:[['cfo','영업현금흐름','amount'],['capex','CAPEX','amount']],s:'',c:()=>A('cfo')-A('capex'),i:'영업활동으로 벌어들인 현금에서 설비투자를 뺀 값입니다. 현금흐름 분석의 출발점입니다.'},
{g:'현금흐름',k:'fcfYield',t:'FCF Yield',f:'FCF / 시가총액',fs:[['fcf','FCF','amount'],['marketCap','시가총액','amount']],s:'%',c:()=>pct('fcf','marketCap'),i:'시가총액 대비 실제 현금창출력을 보여줍니다. 배당·자사주 매입 여력을 볼 때 유용합니다.'},
{g:'현금흐름',k:'pFcf',t:'P/FCF',f:'시가총액 / FCF',fs:[['marketCap','시가총액','amount'],['fcf','FCF','amount']],s:'x',c:()=>divA('marketCap','fcf'),i:'FCF 기준 PER 대체 지표입니다. 회계이익보다 현금을 중시할 때 유용합니다.'},
{g:'현금흐름',k:'cfoYield',t:'CFO Yield',f:'영업현금흐름 / 시가총액',fs:[['cfo','영업현금흐름','amount'],['marketCap','시가총액','amount']],s:'%',c:()=>pct('cfo','marketCap'),i:'영업현금흐름을 시가총액과 비교합니다. 이익의 현금화 정도를 볼 수 있습니다.'},
{g:'현금흐름',k:'croicCash',t:'CROIC',f:'FCF / 투자자본',fs:[['fcf','FCF','amount'],['investedCapital','투자자본','amount']],s:'%',c:()=>pct('fcf','investedCapital'),i:'투자자본 대비 현금창출력을 봅니다. ROIC보다 현금 중심의 질적 지표입니다.'},
{g:'현금흐름',k:'dcfTv',t:'DCF Terminal Value',f:'내년 FCF / (WACC - 영구성장률)',fs:[['nextFcf','내년 FCF','amount'],['wacc','WACC','percent'],['terminalGrowth','영구성장률','percent']],s:'',c:()=>{let sp=R('wacc')-R('terminalGrowth');return sp>0?A('nextFcf')/(sp/100):null},i:'DCF의 영구가치 계산입니다. WACC와 영구성장률 가정에 매우 민감합니다.'},

{g:'퀄리티',k:'roic',t:'ROIC',f:'NOPAT / 투자자본',fs:[['nopat','NOPAT','amount'],['investedCapital','투자자본','amount']],s:'%',c:()=>pct('nopat','investedCapital'),i:'투하자본으로 얼마나 세후 영업이익을 내는지 봅니다. 장기 경쟁력과 자본효율성의 핵심 지표입니다.'},
{g:'퀄리티',k:'roce',t:'ROCE',f:'EBIT / 사용 자본',fs:[['ebit','EBIT','amount'],['capitalEmployed','사용 자본','amount']],s:'%',c:()=>pct('ebit','capitalEmployed'),i:'사용 자본 대비 영업이익률입니다. 유럽 기관과 제조업 분석에서 자주 사용합니다.'},
{g:'퀄리티',k:'roiic',t:'ROIIC',f:'증가 NOPAT / 증가 투자자본',fs:[['deltaNopat','증가 NOPAT','amount'],['deltaInvestedCapital','증가 투자자본','amount']],s:'%',c:()=>pct('deltaNopat','deltaInvestedCapital'),i:'새로 투입한 자본이 얼마나 수익을 내는지 봅니다. 성장의 질을 평가할 때 중요합니다.'},

function sync(){
  let ev=calc('ev'); if(!has(st.v.ev)&&Number.isFinite(ev)) st.v.ev=String(ev/units[st.u][1]);
  let f=calc('fcf'); if(!has(st.v.fcf)&&Number.isFinite(f)) st.v.fcf=String(f/units[st.u][1]);
  let n=calc('nav'); if(!has(st.v.nav)&&Number.isFinite(n)) st.v.nav=String(n/units[st.u][1]);
}
function calc(k){let m=metrics.find(x=>x.k===k);return m?m.c():null}
function addRecent(t){st.recent=[t,...st.recent.filter(x=>x!==t)].slice(0,7);renderRecent()}
function toast(t){let e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1100)}
function openDrawer(){drawer.classList.add('show');drawerOverlay.classList.add('show')}
function closeDrawerFn(){drawer.classList.remove('show');drawerOverlay.classList.remove('show')}
function render(){sync();renderUnits();renderGroups();renderRecent();renderCards()}
function renderUnits(){
  unitTabs.innerHTML=units.map((u,i)=>`<button class="${i===st.u?'on':''}" data-u="${i}">${u[0]}</button>`).join('');
  document.querySelectorAll('[data-u]').forEach(b=>b.onclick=()=>{st.u=+b.dataset.u;render()})
}
function renderGroups(){
  groupsEl=document.getElementById('groups');
  groupsEl.innerHTML=groups.map(g=>`<button class="nav ${g===st.g?'on':''}" data-g="${g}"><span>${g}</span><span class="count">${metrics.filter(m=>m.g===g).length}</span></button>`).join('');
  document.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>{st.g=b.dataset.g;st.q='';setSearch('');closeDrawerFn();render()})
}
function renderRecent(){
  recent.innerHTML=st.recent.length?st.recent.map(r=>`<button class="recentItem" data-r="${r}">${r}</button>`).join(''):'<div style="color:#94a3b8;font-size:13px;padding:8px">최근 열람 없음</div>';
  document.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>{let m=metrics.find(x=>x.t===b.dataset.r);if(m)st.g=m.g;st.q=b.dataset.r;setSearch(st.q);closeDrawerFn();render()})
}
function renderCards(){
  sync();
  let q=(st.q||'').toLowerCase().trim();
  let list=metrics.filter(m=>m.g===st.g&&(!q||m.t.toLowerCase().includes(q)||m.f.toLowerCase().includes(q)));
  sectionTitle.textContent=st.g;
  sectionCount.textContent=`${list.length}개 지표`;
  cards.innerHTML=list.map(card).join('')||'<div class="panel" style="padding:24px;color:#64748b">검색 결과가 없습니다.</div>';
  attachEvents()
}
function card(m){
  let c=m.c(),done=c!==null&&c!==undefined&&Number.isFinite(c),open=st.open.includes(m.k),po=st.proc.includes(m.k);
  let inputs=m.fs.map(([k,l,type])=>{
    let linked=(k==='fcf'||k==='ev'||k==='nav')&&has(st.v[k]);
    return `<div class="field"><label>${l} ${linked?'<span class="link">↗</span><span class="linkcap">자동 연결</span>':''}</label><input data-key="${k}" value="${fin(st.v[k])}" placeholder="0"><div class="unit">${unit(type)}</div></div>`
  }).join('');
  let p=procText(m);
  return `<div class="card ${open?'open':''}">
    <button class="ctop" data-tog="${m.k}">
      <div class="cl"><span class="stat ${done?'done':''}" data-status="${m.k}"></span><span class="name">${m.t}</span><span class="tipw"><span class="q">?</span><span class="tip">${m.i}</span></span><span class="badge">입력 ${m.fs.length}개</span></div>
      <div style="display:flex;align-items:center;gap:16px">${!open?`<span class="closed" data-closed="${m.k}">${fmt(c,m.s)}</span>`:''}<span class="chev">${open?'⌃':'⌄'}</span></div>
    </button>
    <div class="body"><div class="inputs">${inputs}</div><div class="resbox"><div class="resrow"><div class="res" data-result="${m.k}">${fmt(c,m.s)}</div><button class="copy" data-copy="${fmt(c,m.s)}" data-copy-key="${m.k}">⧉</button></div><div class="formula">${m.f}</div><button class="procbtn" data-proc="${m.k}">${po?'계산 과정 숨기기':'계산 과정 보기'}⌄</button><div class="proc ${po?'show':''}"><div class="procin" data-process-text="${m.k}">${p}</div></div></div></div>
  </div>`
}
function procText(m){
  let c=m.c();
  return m.fs.map(([k,l,type])=>`${l}: ${has(st.v[k])?fin(st.v[k])+' '+unit(type):'미입력'}`).join('\n')+`\n\n${m.t} = ${m.f}\n= ${fmt(c,m.s)}`
}
function updateDynamic(){
  sync();
  metrics.forEach(m=>{
    let c=m.c(),done=c!==null&&c!==undefined&&Number.isFinite(c);
    document.querySelectorAll(`[data-result="${m.k}"]`).forEach(e=>e.textContent=fmt(c,m.s));
    document.querySelectorAll(`[data-closed="${m.k}"]`).forEach(e=>e.textContent=fmt(c,m.s));
    document.querySelectorAll(`[data-status="${m.k}"]`).forEach(e=>e.classList.toggle('done',done));
    document.querySelectorAll(`[data-copy-key="${m.k}"]`).forEach(e=>e.dataset.copy=fmt(c,m.s));
    document.querySelectorAll(`[data-process-text="${m.k}"]`).forEach(e=>e.textContent=procText(m))
  });
  document.querySelectorAll('input[data-key]').forEach(i=>{if(document.activeElement===i)return;i.value=fin(st.v[i.dataset.key])})
}
function formatActive(i){
  let before=i.value,cursor=i.selectionStart||before.length,left=before.slice(0,cursor).replaceAll(',',''),rv=before.replaceAll(',','');
  if(!valid(rv)){i.value=fin(st.v[i.dataset.key]);return null}
  i.value=fin(rv);
  let nc=0,rc=0;while(nc<i.value.length&&rc<left.length){if(i.value[nc]!==',')rc++;nc++}
  i.setSelectionRange(nc,nc);return rv
}
function attachEvents(){
  document.querySelectorAll('[data-tog]').forEach(b=>b.onclick=e=>{
    if(e.target.closest('.tipw'))return;
    let k=b.dataset.tog;
    st.open=st.open.includes(k)?st.open.filter(x=>x!==k):[...st.open,k];
    let m=metrics.find(x=>x.k===k);if(m)addRecent(m.t);
    renderCards()
  });
  document.querySelectorAll('input[data-key]').forEach(i=>i.oninput=()=>{
    let rv=formatActive(i);if(rv===null)return;
    st.v[i.dataset.key]=rv;
    if(['cfo','capex'].includes(i.dataset.key))delete st.v.fcf;
    if(['marketCap','debt','cash'].includes(i.dataset.key))delete st.v.ev;
    if(['assetValue','liabilityValue'].includes(i.dataset.key))delete st.v.nav;
    updateDynamic()
  });
  document.querySelectorAll('[data-proc]').forEach(b=>b.onclick=()=>{
    let k=b.dataset.proc;st.proc=st.proc.includes(k)?st.proc.filter(x=>x!==k):[...st.proc,k];renderCards()
  });
  document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(b.dataset.copy);toast('복사됨')})
}
function setSearch(v){search.value=v;mobileSearch.value=v}
menuBtn.onclick=openDrawer;closeDrawer.onclick=closeDrawerFn;drawerOverlay.onclick=closeDrawerFn;
search.oninput=e=>{st.q=e.target.value;mobileSearch.value=st.q;renderCards()};
mobileSearch.oninput=e=>{st.q=e.target.value;search.value=st.q;renderCards()};
clearRecent.onclick=()=>{st.recent=[];renderRecent()};
collapseAll.onclick=()=>{st.open=[];renderCards()};
resetAll.onclick=()=>{st={g:'핵심',q:'',v:{},u:1,open:['per','fcf'],proc:[],recent:st.recent};setSearch('');render();toast('초기화됨')};
setSearch('');render();
</script>
</body>
</html>
